name: Build and Deploy Typst

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Install Python and system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make

      - name: Run C++ preprocessor
        run: python3 content/tex/preprocessor_typst.py --batch

      - name: Compile Typst Files
        uses: ammar-ahmed22/compile-typst-action@v2
        with:
          source_paths: 'content/kactl.typ content/test-session/test-session.typ'
          output_paths: 'kactl.pdf test-session.pdf'

      - name: Check and package PDFs
        run: |
          file kactl.pdf | grep -q ' PDF '
          file test-session.pdf | grep -q ' PDF '
          mkdir public
          cp kactl.pdf public/
          cp test-session.pdf public/

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: |
            public/kactl.pdf
            public/test-session.pdf

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
